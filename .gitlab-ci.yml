stages:
  - build
  - upload

build-job:
  stage: build
  script:
    - wails build -clean    # 使用 Wails 构建应用
  artifacts:
    paths:
      - build/bin/          # 上传构建后的文件（路径根据 Wails 实际输出调整）
    expire_in: 1 week       # 产物保留时间

upload-release-asset:
  stage: upload
  script:
    # 使用 API 上传到 Release（需提前打标签）
    - 'curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/bin/Deploy.exe "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/v1.0.0/assets/links?name=Deploy.exe&url=https://${GITLAB_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/generic/myapp/1.0.0/Deploy.exe"'
  only:
    - tags  # 仅当推送标签时触发
